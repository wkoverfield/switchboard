version: 1
enforcement: strict

defaults:
  defaultEnvironment: local

profiles:
  switchboard_fixture:
    provider: generic
    environment: local
    namespace: switchboard_fixture
    readOnly: true
    description: Fixture profile for config, schema, namespace validation, and profile testing.
    upstream:
      type: stdio
      command: node
      args:
        - packages/mcp-runtime/fixtures/echo-server.mjs
        - switchboard

workspaces:
  switchboard:
    paths:
      - .
    profiles:
      - switchboard_fixture
    defaultEnvironment: local

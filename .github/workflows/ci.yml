name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - "feat/**"
      - "fix/**"
      - "chore/**"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm smoke:cli-help
      - run: pnpm smoke:cli-status
      - run: pnpm smoke:cli-doctor
      - run: pnpm smoke:repo-config
      - run: pnpm smoke:init
      - run: pnpm smoke:profile-test
      - run: pnpm smoke:audit-profile-test
      - run: pnpm smoke:secret-ref-profile
      - run: pnpm smoke:mandate-secret-ref
      - run: pnpm smoke:provider-presets
      - run: pnpm smoke:provider-add
      - run: pnpm smoke:github-ci-first-loop
      - run: pnpm smoke:harness-subagent-proof
      - run: pnpm smoke:vercel-preview-dogfood
      - run: pnpm smoke:package-pack
      - run: pnpm smoke:mandate-lifecycle
      - run: pnpm smoke:mandate-walkthrough
      - run: pnpm smoke:install-codex
      - run: pnpm smoke:install-claude
      - run: pnpm smoke:install-write-codex
      - run: pnpm smoke:install-write-claude
      - run: pnpm smoke:daemon-lifecycle
      - run: pnpm smoke:daemon-list-tools
      - run: pnpm smoke:daemon-mcp-list-tools
      - run: pnpm smoke:mcp-serve-session

version: 1
profiles:
  github_ci:
    provider: github
    environment: development
    namespace: github_ci
    upstream:
      type: stdio
      command: npx
      args: ["-y", "@modelcontextprotocol/server-github"]
      env:
        GITHUB_PERSONAL_ACCESS_TOKEN:
          secretRef: github/ci/token
  vercel_preview:
    provider: vercel
    environment: development
    namespace: vercel_preview
    upstream:
      type: stdio
      command: npx
      args: ["-y", "vercel-mcp"]
      env:
        VERCEL_TOKEN:
          secretRef: vercel/preview/token
